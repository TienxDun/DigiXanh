<header class="admin-header">
  <!-- Top Row -->
  <div class="header-row">
    <!-- Left: Toggle + Breadcrumb -->
    <div class="header-left">
      <button [cSidebarToggle]="sidebarId()" cHeaderToggler class="btn-menu" toggle="visible"
        aria-label="Toggle sidebar">
        <svg cIcon name="cilMenu" size="lg"></svg>
      </button>

      <c-breadcrumb-router class="breadcrumb-custom"></c-breadcrumb-router>
    </div>

    <!-- Right: Actions -->
    <div class="header-right">
      <!-- Theme -->
      <button class="btn-action" (click)="toggleTheme()" [attr.aria-label]="isDark ? 'Light mode' : 'Dark mode'">
        <svg cIcon [name]="isDark ? 'cilSun' : 'cilMoon'" size="lg"></svg>
      </button>

      <!-- View Store -->
      <a routerLink="/" target="_blank" class="btn-action text-decoration-none" title="Xem cửa hàng">
        <svg cIcon name="cilExternalLink" size="lg"></svg>
      </a>

      <!-- User -->
      <c-dropdown alignment="end" variant="nav-item">
        <button cDropdownToggle class="btn-user" [caret]="false" aria-label="User menu">
          <div class="user-avatar">
            {{ ((currentUser?.fullName || currentUser?.email || 'A') + '') | slice:0:1 | uppercase }}
          </div>
        </button>
        <ul cDropdownMenu class="dropdown-menu-custom">
          <li class="dropdown-header-user">
            <div class="user-avatar-lg">{{ ((currentUser?.fullName || currentUser?.email || 'A') + '') | slice:0:1 |
              uppercase }}</div>
            <div class="user-info">
              <div class="user-name">{{ currentUser?.fullName || currentUser?.email || 'Admin' }}</div>
              <div class="user-role">Quản trị viên</div>
            </div>
          </li>
          <li>
            <hr class="dropdown-divider">
          </li>
          <li>
            <button class="dropdown-item logout-item" (click)="logout()">
              <svg cIcon name="cilAccountLogout" class="item-icon"></svg>
              <span>Đăng xuất</span>
            </button>
          </li>
        </ul>
      </c-dropdown>
    </div>
  </div>
</header>
