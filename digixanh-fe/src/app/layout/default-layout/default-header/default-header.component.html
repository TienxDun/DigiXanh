<!--<c-header class="mb-4 d-print-none" position="sticky">-->
<ng-container>
  <c-container [fluid]="true" class="border-bottom px-4">
    <button [cSidebarToggle]="sidebarId()" cHeaderToggler class="btn" toggle="visible"
      style="margin-inline-start: -14px;" aria-label="Toggle sidebar navigation">
      <svg cIcon name="cilMenu" size="lg"></svg>
    </button>

    <c-header-nav class="ms-auto ms-md-0">
      <div class="nav-item py-1">
        <div class="vr h-100 mx-2 text-body text-opacity-75"></div>
      </div>
      <ng-container *ngTemplateOutlet="themeDropdown" />
      <div class="nav-item py-1">
        <div class="vr h-100 mx-2 text-body text-opacity-75"></div>
      </div>
    </c-header-nav>

    <c-header-nav class="mx-3">
      <ng-container *ngIf="authService.isAuthenticated$ | async; else loginLinks">
        <c-dropdown variant="nav-item" alignment="end">
          <a cDropdownToggle class="nav-link py-0 d-flex align-items-center" style="cursor: pointer;" [caret]="false">
            <div
              class="avatar bg-success text-white me-2 d-flex align-items-center justify-content-center fw-bold shadow-sm"
              style="width: 36px; height: 36px; border-radius: 50%;">
              {{ ((currentUser?.fullName || currentUser?.email || 'A') + '') | slice:0:1 | uppercase }}
            </div>
            <div class="d-none d-md-flex flex-column align-items-start">
              <span class="fw-semibold text-dark" style="line-height: 1.2;">{{ currentUser?.fullName ||
                currentUser?.email || 'Admin' }}</span>
              <small class="text-muted" style="font-size: 0.75rem;"><svg cIcon name="cilShieldAlt" size="sm"
                  class="me-1"></svg>Quản trị viên</small>
            </div>
          </a>
          <ul cDropdownMenu class="pt-0 pb-0 mt-3 shadow border-0 rounded-3">
            <li>
              <h6 cDropdownHeader class="bg-body-secondary fw-semibold py-2 rounded-top-3 border-bottom">Tài khoản của
                tôi</h6>
            </li>
            <li>
              <button cDropdownItem class="py-2">
                <svg cIcon name="cilUser" class="me-2 text-primary"></svg>
                Hồ sơ cá nhân
              </button>
            </li>
            <li>
              <button cDropdownItem class="py-2">
                <svg cIcon name="cilSettings" class="me-2 text-secondary"></svg>
                Cài đặt
              </button>
            </li>
            <li>
              <hr cDropdownDivider class="my-0" />
            </li>
            <li>
              <button cDropdownItem class="bg-danger-subtle text-danger fw-semibold py-2 rounded-bottom-3"
                (click)="logout()">
                <svg cIcon name="cilAccountLogout" class="me-2"></svg>
                Đăng xuất
              </button>
            </li>
          </ul>
        </c-dropdown>
      </ng-container>
      <ng-template #loginLinks>
        <c-nav-item>
          <a cNavLink routerLink="/auth/login" class="fw-semibold text-success">
            <svg cIcon name="cilLockLocked" class="me-1"></svg>Đăng nhập
          </a>
        </c-nav-item>
      </ng-template>
    </c-header-nav>

  </c-container>
  <c-container [fluid]="true" class="px-4">
    <c-breadcrumb-router />
  </c-container>
</ng-container>
<!--</c-header>-->

<ng-template #themeDropdown>
  <c-dropdown alignment="end" variant="nav-item">
    <button [caret]="false" cDropdownToggle aria-label="Open theme picker">
      <svg cIcon [name]="icons()" size="lg"></svg>
    </button>
    <div cDropdownMenu>
      @for (mode of colorModes; track mode.name) {
      <button (click)="colorMode.set(mode.name)" [active]="colorMode()===mode.name" cDropdownItem
        class="d-flex align-items-center">
        <svg cIcon class="me-2" [name]="mode.icon" size="lg"></svg>
        {{ mode.text }}
      </button>
      }
    </div>
  </c-dropdown>
</ng-template>
