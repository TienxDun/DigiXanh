<header class="glass-header sticky-top">
  <div class="container d-flex justify-content-between align-items-center py-3">
    <a class="navbar-brand fw-bold fs-4 text-success d-flex align-items-center gap-2" routerLink="/">
      <i class="fa-solid fa-leaf"></i> DigiXanh
    </a>
    <nav class="d-flex gap-3 align-items-center">
      <a class="nav-link fw-medium" routerLink="/" routerLinkActive="active-link"
        [routerLinkActiveOptions]="{exact: true}">Trang chủ</a>

      @if (!authService.isAuthenticated()) {
      <a class="btn btn-success btn-custom shadow-sm px-4 rounded-pill fw-medium" routerLink="/auth/login">
        Đăng nhập
      </a>
      } @else {
      @if (authService.isAdmin()) {
      <a class="btn btn-outline-success btn-custom rounded-pill fw-medium" routerLink="/admin/dashboard">
        <i class="fa-solid fa-user-shield me-1"></i> Admin
      </a>
      }
      <button class="btn btn-outline-danger btn-custom rounded-pill fw-medium" type="button" (click)="logout()">
        <i class="fa-solid fa-sign-out-alt me-1"></i> Đăng xuất
      </button>
      }
    </nav>
  </div>
</header>

<main class="main-content">
  <router-outlet />
</main>

<footer class="footer-glass py-4 mt-auto">
  <div class="container text-center text-muted">
    <p class="mb-0 fw-medium">&copy; 2026 DigiXanh - Mang thiên nhiên nơi không gian số.</p>
  </div>
</footer>
