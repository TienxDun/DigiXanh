<div class="auth-wrapper min-vh-100 d-flex flex-row align-items-center justify-content-center">
    <a routerLink="/" class="back-home-btn">
        <i class="fa-solid fa-arrow-left"></i>
        <span>Quay về trang chủ</span>
    </a>
    <!-- Animated background elements -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>

    <div class="container position-relative z-1">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5">
                <div class="auth-card shadow-lg border-0 overflow-hidden">
                    <div class="auth-card-body p-5">
                        <div class="text-center mb-4">
                            <a routerLink="/"
                                class="text-decoration-none logo-wrapper d-inline-flex align-items-center gap-2 mb-2">
                                <i class="fa-solid fa-leaf text-success fs-3"></i>
                                <span class="fw-bold fs-3 text-dark">DigiXanh</span>
                            </a>
                            <p class="text-muted mt-2 fs-6">Chào mừng trở lại! Vui lòng đăng nhập.</p>
                        </div>

                        <form [formGroup]="form" (ngSubmit)="login()" class="auth-form">
                            <div *ngIf="errorMessage"
                                class="alert custom-alert-danger d-flex align-items-center gap-2 shadow-sm rounded-3 mb-4"
                                role="alert">
                                <i class="fa-solid fa-circle-exclamation text-danger fs-5"></i>
                                <div>{{ errorMessage }}</div>
                            </div>

                            <formly-form [form]="form" [fields]="fields" [model]="model"></formly-form>

                            <div class="d-flex justify-content-between align-items-center mt-3 mb-4">
                                <div class="form-check custom-checkbox">
                                    <input class="form-check-input" type="checkbox" id="rememberMe">
                                    <label class="form-check-label text-muted small" for="rememberMe">
                                        Ghi nhớ đăng nhập
                                    </label>
                                </div>
                                <a href="#" class="text-success text-decoration-none small fw-medium hover-underline"
                                    (click)="$event.preventDefault()">Quên mật khẩu?</a>
                            </div>

                            <div class="d-grid mt-2">
                                <button
                                    class="btn btn-success btn-auth py-2 fs-6 fw-bold rounded-pill text-white shadow-sm"
                                    type="submit" [disabled]="isLoading">
                                    <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2" role="status"
                                        aria-hidden="true"></span>
                                    <i *ngIf="!isLoading" class="fa-solid fa-right-to-bracket me-2"></i>
                                    Đăng nhập
                                </button>
                            </div>

                            <div class="mt-4 text-center">
                                <span class="text-muted small">Chưa có tài khoản? </span>
                                <a routerLink="/auth/register"
                                    class="text-success fw-bold text-decoration-none hover-underline small">Đăng ký
                                    ngay</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<c-toaster class="p-3" position="fixed" placement="top-end">
    <c-toast [visible]="showToast" [color]="toastColor" (visibleChange)="showToast = $event"
        class="custom-toast shadow-lg border-0 rounded-3">
        <c-toast-body class="d-flex align-items-center gap-2 px-3 py-2 fw-medium">
            <i class="fa-solid"
                [ngClass]="toastColor === 'success' ? 'fa-check-circle text-success' : 'fa-xmark-circle text-danger'"></i>
            {{ toastMessage }}
        </c-toast-body>
    </c-toast>
</c-toaster>
