name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'digixanh-fe/**'
      - '.github/workflows/deploy-fe.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './digixanh-fe/package-lock.json'

      - name: Install dependencies
        run: |
          cd digixanh-fe
          npm ci

      - name: Run tests
        run: |
          cd digixanh-fe
          npm run test:ci -- --coverage
        continue-on-error: true

      - name: Build
        run: |
          cd digixanh-fe
          ./node_modules/.bin/ng build --configuration=production --base-href=/DigiXanh/

      - name: Copy index.html to 404.html
        run: cp digixanh-fe/dist/coreui-free-angular-admin-template/browser/index.html digixanh-fe/dist/coreui-free-angular-admin-template/browser/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './digixanh-fe/dist/coreui-free-angular-admin-template/browser'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
