name: Keep Backend Awake (Render Free)

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: keep-be-awake
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      RENDER_HEALTH_URL: ${{ vars.RENDER_HEALTH_URL }}
    steps:
      - name: Ping backend health endpoint
        run: |
          set -e
          URL="${RENDER_HEALTH_URL:-https://digixanh.onrender.com/api/health}"
          echo "Pinging $URL"

          HTTP_CODE=$(curl -sS -o /dev/null -w "%{http_code}" \
            --connect-timeout 15 \
            --max-time 30 \
            --retry 2 \
            --retry-delay 2 \
            "$URL")

          echo "HTTP status: $HTTP_CODE"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 500 ]; then
            echo "Unexpected status code: $HTTP_CODE"
            exit 1
          fi
